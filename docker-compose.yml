# .env.example
# DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tidedb
# REDIS_URL=redis://redis:6379/0
# NOAA_API_BASE=https://api.tidesandcurrents.noaa.gov/api/prod/datagetter
# MODEL_CHECKPOINT_PATH=/app/ml/checkpoints/full_checkpoint2.pth

version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: tide_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tidedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tide_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./backend
    container_name: tide_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tidedb
      - REDIS_URL=redis://redis:6379/0
      - MODEL_CHECKPOINT_PATH=/app/ml/checkpoints/full_checkpoint2.pth
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  ingestion:
    build:
      context: ./ingestion
    container_name: tide_ingestion
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tidedb
      - REDIS_URL=redis://redis:6379/0
      - NOAA_API_BASE=https://api.tidesandcurrents.noaa.gov/api/prod/datagetter
    depends_on:
      - postgres
      - redis
    volumes:
      - ./ingestion:/app
    restart: unless-stopped

volumes:
  postgres_data:
